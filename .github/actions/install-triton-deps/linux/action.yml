name: Install Triton dependencies (Linux)

description: Installs all dependencies required to build and test Triton on Linux

inputs:
  python-version:
    description: Python version to use
    default: '3.11'
  llvm-version:
    description: LLVM version to install
    default: '17'
  bitwuzla-version:
    description: Bitwuzla version to install
    default: '0.9.0'
  capstone-version:
    description: Capstone version to install
    default: '5.0.7'

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Upgrade pip
      run: |
        python -m pip install -U pip
      shell: bash

    - name: Install build dependencies
      run: |
        sudo apt-get install -y python3-setuptools ninja-build
      shell: bash

    - name: Install Python build dependencies
      run: |
        python -m pip install setuptools importlib-resources meson
      shell: bash

    - name: Install Bitwuzla dependencies
      run: |
        sudo apt-get install -y libgmp-dev libmpfr-dev
      shell: bash

    - name: Install Boost
      run: |
        sudo apt-get install -y libboost-dev
      shell: bash

    - name: Install LLVM
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: ${{ inputs.llvm-version }}
        directory: ${{ runner.temp }}/llvm

    - name: Install z3
      run: |
        wget -q https://github.com/Z3Prover/z3/releases/download/z3-4.16.0/z3-4.16.0-x64-glibc-2.39.zip && \
        unzip -q z3-4.16.0-x64-glibc-2.39.zip
        echo "Z3_INCLUDE_DIRS=$GITHUB_WORKSPACE/z3-4.16.0-x64-glibc-2.39/include" >> $GITHUB_ENV
        echo "Z3_LIBRARIES=$GITHUB_WORKSPACE/z3-4.16.0-x64-glibc-2.39/bin/libz3.so" >> $GITHUB_ENV
      shell: bash

    - name: Install Bitwuzla
      run: |
        wget -q https://github.com/bitwuzla/bitwuzla/archive/refs/tags/${{ inputs.bitwuzla-version }}.tar.gz
        tar -xf ${{ inputs.bitwuzla-version }}.tar.gz
        cd bitwuzla-${{ inputs.bitwuzla-version }}
        python ./configure.py --shared
        cd build
        sudo ninja install
        sudo ldconfig
        echo "BITWUZLA_INCLUDE_DIRS=/usr/local/include" >> $GITHUB_ENV
        echo "BITWUZLA_LIBRARIES=/usr/local/lib/x86_64-linux-gnu/libbitwuzla.so" >> $GITHUB_ENV
      shell: bash

    - name: Install Capstone
      run: |
        wget -q https://github.com/capstone-engine/capstone/releases/download/5.0.7/capstone-${{ inputs.capstone-version }}.tar.xz
        tar -xf capstone-${{ inputs.capstone-version }}.tar.xz
        cd capstone-${{ inputs.capstone-version }}
        bash ./make.sh
        sudo make install
      shell: bash

    - name: Install Unicorn and LIEF
      run: |
        python -m pip install unicorn lief
      shell: bash
